<!DOCTYPE html>
<html>
<head>
    <title>Real Calculator</title>
    <style>
        body {
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculator {
            background: black;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px #000;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: right;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 60px;
            height: 60px;
            font-size: 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .number { background: #333; color: white; }
        .operator { background: orange; color: white; }
        .clear { background: red; color: white; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <br>

    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator" onclick="append('/')">/</button>
    <button class="operator" onclick="append('*')">*</button>
    <button class="operator" onclick="deleteLast()">⌫</button>

    <br>

    <button class="number" onclick="append('7')">7</button>
    <button class="number" onclick="append('8')">8</button>
    <button class="number" onclick="append('9')">9</button>
    <button class="operator" onclick="append('-')">-</button>

    <br>

    <button class="number" onclick="append('4')">4</button>
    <button class="number" onclick="append('5')">5</button>
    <button class="number" onclick="append('6')">6</button>
    <button class="operator" onclick="append('+')">+</button>

    <br>

    <button class="number" onclick="append('1')">1</button>
    <button class="number" onclick="append('2')">2</button>
    <button class="number" onclick="append('3')">3</button>
    <button class="operator" onclick="calculate()">=</button>

    <br>

    <button class="number" onclick="append('0')" style="width: 130px;">0</button>
    <button class="number" onclick="append('.')">.</button>

</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function deleteLast() {
    let current = document.getElementById("display").value;
    document.getElementById("display").value = current.slice(0, -1);
}

function calculate() {
    try {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        alert("Invalid Expression");
    }
}
</script>

</body>
</html>
